  <!-- 🔥 FIX 1: Local + GitHub redirect -->
  <script>
    (function () {
      var path = window.location.pathname;

      // Fix for local: /index.html → /
      if (path.endsWith('/index.html')) {
        window.location.replace(path.replace('/index.html', '/') + window.location.search + window.location.hash);
      }

      // Fix for GitHub Pages
      var repo = "/anshika";
      if (path.startsWith(repo) && !window.location.hash) {
        var newUrl = repo + "/#" + path.replace(repo, "");
        window.location.replace(newUrl);
      }
    })();
  </script>
